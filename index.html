    --brick:#DC2626;

    --ink-soft:#4B5573;

    color:var(--ink);

    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:48px 20px;
  }

    content:'';

  .masthead-sub{

  .masthead-name{

let QUESTIONS = FALLBACK_QUESTIONS;

function parseCSV(text){
  // Minimal CSV parser that handles quoted fields and commas/newlines inside quotes.
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;
  for(let i=0; i<text.length; i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else { inQuotes = false; }
      } else {
        field += c;
      }
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === ','){ row.push(field); field = ''; }
      else if(c === '\n'){ row.push(field); rows.push(row); row = []; field = ''; }
      else if(c === '\r'){ /* skip */ }
      else { field += c; }
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => r.length > 1 || (r.length === 1 && r[0].trim() !== ''));
}

function csvRowsToQuestions(rows){
  if(rows.length < 2) return [];
  const header = rows[0].map(h => h.trim().toLowerCase());
  const idx = {
    id: header.indexOf('id'),
    section: header.indexOf('section'),
    question: header.indexOf('question'),
    a: header.indexOf('option_a'),
    b: header.indexOf('option_b'),
    c: header.indexOf('option_c'),
    d: header.indexOf('option_d'),
    correct: header.indexOf('correct_letter'),
    explanation: header.indexOf('explanation')
  };
  const letterMap = { a: 0, b: 1, c: 2, d: 3 };
  const out = [];
  for(let i=1; i<rows.length; i++){
    const r = rows[i];
    if(!r[idx.question] || !r[idx.question].trim()) continue;
    const options = [r[idx.a], r[idx.b], r[idx.c], r[idx.d]].map(o => (o || '').trim());
    const letter = (r[idx.correct] || '').trim().toLowerCase();
    const correctIdx = letterMap[letter];
    if(correctIdx === undefined) continue;
    out.push({
      id: (r[idx.id] || ('row' + i)).trim(),
      section: (r[idx.section] || 'General').trim(),
      question: r[idx.question].trim(),
      options,
      correct: correctIdx,
      explanation: (r[idx.explanation] || '').trim()
    });
  }
  return out;
}

async function loadQuestions(){
  if(!SHEET_CSV_URL){
    QUESTIONS = FALLBACK_QUESTIONS;
    return;
  }
  try{
    const resp = await fetch(SHEET_CSV_URL);
    if(!resp.ok) throw new Error('Sheet fetch failed: ' + resp.status);
    const text = await resp.text();
    const rows = parseCSV(text);
    const parsed = csvRowsToQuestions(rows);
    if(parsed.length > 0){
      QUESTIONS = parsed;
    } else {
      QUESTIONS = FALLBACK_QUESTIONS;
    }
  }catch(e){
    console.error('Could not load sheet, using fallback bank.', e);
    QUESTIONS = FALLBACK_QUESTIONS;
  }
}

let presetName = params.get('name') || '';

function hashStr(s){
  let h = 0;
  for(let i=0;i<s.length;i++){
    h = ((h<<5)-h) + s.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

async function getSeenQuestionIds(name){
  const key = 'seen:' + name.trim().toLowerCase();
  try{
    const r = await window.storage.get(key, true);
    if(r && r.value) return JSON.parse(r.value);
  }catch(e){ /* no history yet */ }
  return [];
}

async function markQuestionSeen(name, questionId){
  const key = 'seen:' + name.trim().toLowerCase();
  const seen = await getSeenQuestionIds(name);
  if(!seen.includes(questionId)){
    seen.push(questionId);
  }
  try{
    await window.storage.set(key, JSON.stringify(seen), true);
  }catch(e){
    console.error('Could not save question history', e);
  }
}

async function pickQuestionForName(name){
  const seen = await getSeenQuestionIds(name);
  let pool = QUESTIONS.filter(q => !seen.includes(q.id));
  if(pool.length === 0){
    // Everyone's seen the whole bank — start a fresh cycle.
    pool = QUESTIONS;
  }
  const seed = hashStr(name.trim().toLowerCase() + ':' + seen.length);
  const idx = seed % pool.length;
  return pool[idx];
}

function renderMasthead(name){
  return `
    <div class="masthead">
      <div class="masthead-left">
        <span class="masthead-mark">SOP Knowledge Check</span>
        <span class="masthead-sub">Internal reference</span>
      </div>
      <span class="masthead-name">${name ? escapeHtml(name) : ''}</span>
    </div>
  `;
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}


async function logResult(name, q, chosenIdx, isCorrect) {
  try {
    await fetch("https://script.google.com/macros/s/AKfycbwfmiP6_bZ4lOWDw5pRdIYYeVc2iWccmNxkcWJuZ3KWgszxq1CWved4IycEAVT-Munf3w/exec", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: name,
        question: q.question,
        chosen: q.options[chosenIdx],
        correct: q.options[q.correct],
        isCorrect: isCorrect,
        timestamp: new Date().toISOString()
      })
    });
  } catch (e) {
    console.error("Failed to send data to sheet", e);
  }
}

async function renderQuestion(name){
  app.innerHTML = `${renderMasthead(name)}<div class="card"><div class="card-inner"><p class="qnum">Loading your question…</p></div></div>`;
  const q = await pickQuestionForName(name);
  const letters = ['A','B','C','D'];

  app.innerHTML = `
    ${renderMasthead(name)}
    <div class="card">
      <span class="tab">${escapeHtml(q.section)}</span>
      <div class="card-inner">
        <p class="qnum">Question on file</p>
        <p class="question">${escapeHtml(q.question)}</p>
        <div class="options" id="optionsWrap" role="radiogroup" aria-label="Answer options">
          ${q.options.map((opt, i) => `
            <button type="button" class="opt" data-idx="${i}">
              <span class="opt-letter">${letters[i]}</span>
              <span>${escapeHtml(opt)}</span>
            </button>
          `).join('')}
        </div>
        <div class="feedback" id="feedback">
          <div class="feedback-head" id="feedbackHead"></div>
          <div id="feedbackBody"></div>
        </div>
        <div class="footer-row">
          <div class="track">
            <span class="dot filled"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
          <span class="source-tag">Onboarding &amp; Invites SOP</span>
        </div>
      </div>
    </div>
  `;

  const buttons = Array.from(document.querySelectorAll('.opt'));
  let answered = false;

  buttons.forEach(btn => {
    btn.addEventListener('click', async () => {
      if(answered) return;
      answered = true;
      const chosenIdx = parseInt(btn.getAttribute('data-idx'), 10);
      const isCorrect = chosenIdx === q.correct;

      buttons.forEach((b, i) => {
        b.disabled = true;
        if(i === q.correct){
          b.classList.add('correct');
        } else if(i === chosenIdx && !isCorrect){
          b.classList.add('wrong');
        } else {
          b.classList.add('dim');
        }
      });

      const fb = document.getElementById('feedback');
      const fbHead = document.getElementById('feedbackHead');
      const fbBody = document.getElementById('feedbackBody');
      fb.classList.add('show');
      if(isCorrect){
        fb.classList.add('is-correct');
        fbHead.innerHTML = `<i class="ti ti-check" aria-hidden="true"></i> Correct`;
      } else {
        fb.classList.add('is-wrong');
        fbHead.innerHTML = `<i class="ti ti-x" aria-hidden="true"></i> Not quite`;
      }
      fbBody.textContent = q.explanation;

      await logResult(name, q, chosenIdx, isCorrect);
      await markQuestionSeen(name, q.id);

      setTimeout(() => renderDone(name, isCorrect), 1400);
    });
  });
}

function renderDone(name, isCorrect){
  app.innerHTML = `
    ${renderMasthead(name)}
    <div class="done-state">
      <div class="done-mark ${isCorrect ? 'is-correct' : 'is-wrong'}">
        <i class="ti ${isCorrect ? 'ti-check' : 'ti-x'}" aria-hidden="true"></i>
      </div>
      <h2>${isCorrect ? 'Logged — nice work' : 'Logged'}</h2>
      <p>Your answer has been recorded for the team summary. No further action needed.</p>
    </div>
  `;
}

async function init(){
  app.innerHTML = `${renderMasthead('')}<div class="card"><div class="card-inner"><p class="qnum">Loading question bank…</p></div></div>`;
  await loadQuestions();
  if(presetName){
    renderQuestion(presetName);
  } else {
    renderGate();
  }
}

init();
